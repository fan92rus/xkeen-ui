name: Dev Pre-Release

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'xkeen-go/**'
      - '.github/workflows/build-dev.yml'

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '24'

jobs:
  # ─── Quality Gate — all checks run in parallel ───
  go-checks:
    name: Go (vet, test -race, govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest && $(go env GOPATH)/bin/govulncheck ./...

  frontend-checks:
    name: Frontend (build, test, lint, audit, e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: xkeen-go/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - run: npm audit --omit=dev --audit-level=high

      # ── E2E tests (Puppeteer + Chromium) ──
      # Install Chrome (download) as non-root, then install system deps as root
      - name: Install Chromium + system deps
        run: |
          npx puppeteer browsers install chrome
          sudo -E npx puppeteer browsers install chrome --install-deps

      - name: Setup Go (for e2e server binary)
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: 'true'

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod
      - run: go mod download
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
          working-directory: xkeen-go
          install-mode: goinstall

  security:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/auto
            .semgrep.yml

  # ─── Build (only when all checks pass) ───
  build:
    name: Build Dev Pre-Release
    runs-on: ubuntu-latest
    needs: [go-checks, frontend-checks, lint, security]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: xkeen-go
        run: make build-frontend

      - name: Clean frontend artifacts
        working-directory: xkeen-go
        run: rm -rf web/node_modules web/package-lock.json web/build.js web/static/vendor

      - name: Get branch name
        id: branch
        run: |
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v[0-9]*' | grep -v -- '-dev' | sort -V | tail -1 2>/dev/null || echo "v0.0.0")
          BASE_VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
          MINOR=$(echo $BASE_VERSION | cut -d. -f2)
          PATCH=$(echo $BASE_VERSION | cut -d. -f3)
          PATCH=$((PATCH + 1))
          UNIX_TIME=$(date +%s)
          BRANCH="${{ steps.branch.outputs.branch }}"
          if [ "$BRANCH" = "master" ]; then
            DEV_VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.${UNIX_TIME}"
          else
            SANITIZED=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
            DEV_VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.${SANITIZED}.${UNIX_TIME}"
          fi
          DEV_TAG="v${DEV_VERSION}"
          echo "version=${DEV_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${DEV_TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build binaries
        working-directory: xkeen-go
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=${{ steps.version.outputs.short_sha }}
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w \
            -X main.appVersion=${{ steps.version.outputs.version }} \
            -X main.buildDate=${BUILD_DATE} \
            -X main.gitCommit=${GIT_COMMIT} \
            -X main.buildBranch=${{ steps.branch.outputs.branch }}" \
            -o xkeen-ui-keenetic-arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -ldflags "-s -w \
            -X main.appVersion=${{ steps.version.outputs.version }} \
            -X main.buildDate=${BUILD_DATE} \
            -X main.gitCommit=${GIT_COMMIT} \
            -X main.buildBranch=${{ steps.branch.outputs.branch }}" \
            -o xkeen-ui-keenetic-mipsle

      - name: Compress with UPX
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma xkeen-go/xkeen-ui-keenetic-arm64 -o xkeen-go/xkeen-ui-keenetic-arm64-upx
          mv xkeen-go/xkeen-ui-keenetic-arm64-upx xkeen-go/xkeen-ui-keenetic-arm64
          upx --best --lzma xkeen-go/xkeen-ui-keenetic-mipsle -o xkeen-go/xkeen-ui-keenetic-mipsle-upx
          mv xkeen-go/xkeen-ui-keenetic-mipsle-upx xkeen-go/xkeen-ui-keenetic-mipsle

      - name: Generate SHA256 checksums
        working-directory: xkeen-go
        run: |
          sha256sum xkeen-ui-keenetic-arm64 > xkeen-ui-keenetic-arm64.sha256
          sha256sum xkeen-ui-keenetic-mipsle > xkeen-ui-keenetic-mipsle.sha256
          for file in xkeen-ui-keenetic-arm64.sha256 xkeen-ui-keenetic-mipsle.sha256; do
            if [ $(wc -w < "$file") -ne 2 ]; then echo "ERROR: Invalid checksum format in $file"; exit 1; fi
          done

      - name: Delete old dev releases for this branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH_SLUG="${{ steps.branch.outputs.branch }}"
          if [ "$BRANCH_SLUG" = "master" ]; then
            # Master: v0.11.4-dev.1724921234  (dev + digits only)
            FILTER_PATTERN='-dev\\.\\d+$'
          else
            # Feature branch: v0.11.4-dev.feat-x.1724921234  (dev + slug + timestamp)
            SANITIZED=$(echo "$BRANCH_SLUG" | sed 's/[^a-zA-Z0-9._-]/-/g')
            # Safety: refuse to run if SANITIZED is empty or too short
            if [ -z "${SANITIZED}" ] || [ ${#SANITIZED} -lt 3 ]; then
              echo "ERROR: Sanitized branch name is empty or too short ('${SANITIZED}'), aborting"
              exit 1
            fi
            # Escape regex special characters so dots in branch names (e.g. fix/v1.0.1)
            # don't become wildcards in the jq regex.
            ESCAPED=$(echo "${SANITIZED}" | sed 's/[.+*?^${}()|[\]\\]/\\&/g')
            FILTER_PATTERN='-dev\\.'"$ESCAPED"'\\.'
          fi
          echo "Filter pattern: ${FILTER_PATTERN}"
          gh release list --limit 100 --json tagName,isPrerelease | \
            jq -r --arg pat "$FILTER_PATTERN" '.[] | select(.tagName | test($pat)) | .tagName' | \
            while read tag; do
              if [ -n "$tag" ]; then
                echo "Deleting old dev release: $tag"
                gh release delete "$tag" --yes 2>/dev/null || true
                git push --delete origin "$tag" 2>/dev/null || true
              fi
            done

      - name: Create dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git tag -l | grep -q "^${{ steps.version.outputs.tag }}$"; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping"
            exit 0
          fi
          cat > /tmp/release-notes.md << ENDNOTES
          ## Dev Build ${{ steps.version.outputs.version }}

          **This is a development build.** Use for testing only.

          | Property | Value |
          |----------|-------|
          | Branch | ${{ steps.branch.outputs.branch }} |
          | Commit | \`${{ steps.version.outputs.short_sha }}\` |
          | Build date | $(date -u +%Y-%m-%dT%H:%M:%SZ) |

          ### Supported Devices
          **ARM64** (xkeen-ui-keenetic-arm64): KN-1810, KN-1910, Other Keenetic routers with ARM64
          **MIPS** (xkeen-ui-keenetic-mipsle): KN-1010, KN-1011, Other Keenetic routers with MIPS

          ### Installation
          \`\`\`sh
          chmod +x xkeen-ui-keenetic-arm64  # or xkeen-ui-keenetic-mipsle
          ./xkeen-ui-keenetic-arm64 install
          /opt/etc/init.d/xkeen-ui restart
          \`\`\`
          ENDNOTES
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Dev ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            xkeen-go/xkeen-ui-keenetic-arm64 \
            xkeen-go/xkeen-ui-keenetic-arm64.sha256 \
            xkeen-go/xkeen-ui-keenetic-mipsle \
            xkeen-go/xkeen-ui-keenetic-mipsle.sha256

      - name: Summary
        run: |
          echo "### Dev Pre-Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.version.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
