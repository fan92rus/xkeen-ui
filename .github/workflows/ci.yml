name: CI — PR Quality Gate

# Only triggers on pull requests — gives authors pre-merge feedback.
# On push to master, the same checks run as part of build-dev.yml.
# On release, the same checks run as part of build.yml.
# All three share the same check definitions so nothing can bypass quality.

on:
  pull_request:
    branches:
      - master

env:
  GO_VERSION: '1.26.5'
  NODE_VERSION: '24'

permissions:
  contents: read

jobs:
  go-checks:
    name: Go (vet, test -race, govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest && $(go env GOPATH)/bin/govulncheck ./...

  frontend:
    name: Frontend (build, test, lint, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: xkeen-go/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - run: npm audit --omit=dev --audit-level=high

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod
      - run: go mod download
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
          working-directory: xkeen-go
          install-mode: goinstall

  security:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/auto
            .semgrep.yml
