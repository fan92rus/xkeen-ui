name: Cleanup Branch Releases

# The `delete` event fires for both branch and tag deletions.
# The step-level ref_type check filters to branches only.
on:
  delete:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cleanup:
    name: Delete branch dev releases
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete dev releases for the deleted branch
        run: |
          # Only handle branch deletions, not tags
          if [ "${{ github.event.ref_type }}" != "branch" ]; then
            echo "Not a branch deletion, skipping"
            exit 0
          fi

          # github.event.ref for delete includes refs/heads/ prefix
          RAW_REF="${{ github.event.ref }}"
          BRANCH_NAME="${RAW_REF#refs/heads/}"
          echo "Deleted branch: ${BRANCH_NAME}"

          # Skip master — it's never deleted
          if [ "${BRANCH_NAME}" = "master" ]; then
            echo "Skipping master branch deletion"
            exit 0
          fi

          # Sanitize branch name to match tag format from CI
          SANITIZED=$(echo "${BRANCH_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')

          # Safety: refuse to run if SANITIZED is empty or too short
          if [ -z "${SANITIZED}" ] || [ ${#SANITIZED} -lt 3 ]; then
            echo "ERROR: Sanitized branch name is empty or too short ('${SANITIZED}'), aborting"
            exit 1
          fi

          # Escape regex special characters in SANITIZED so that dots, +, etc.
          # in branch names (e.g. fix/v1.0.1) don't become wildcards.
          ESCAPED=$(echo "${SANITIZED}" | sed 's/[.+*?^${}()|[\]\\]/\\&/g')
          echo "Sanitized: ${SANITIZED}"
          echo "Escaped:   ${ESCAPED}"

          # Pattern: v*.*.*-dev.{sanitized}.{timestamp}
          FILTER_PATTERN='-dev\.'"$ESCAPED"'\.'
          echo "Filter pattern: ${FILTER_PATTERN}"

          # Find matching releases
          echo "Matching releases:"
          gh release list --limit 100 --json tagName,isPrerelease | \
            jq -r --arg pat "$FILTER_PATTERN" '.[] | select(.tagName | test($pat)) | .tagName' | \
            tee /tmp/matching-tags.txt

          # Delete matches
          while read tag; do
            if [ -n "$tag" ]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" --yes 2>/dev/null || true
              git push --delete origin "$tag" 2>/dev/null || true
            fi
          done < /tmp/matching-tags.txt

          echo "Cleanup complete"

      - name: Summary
        run: |
          echo "### Branch Release Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Deleted branch | \`${{ github.event.ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event.ref_type }}\` |" >> $GITHUB_STEP_SUMMARY
