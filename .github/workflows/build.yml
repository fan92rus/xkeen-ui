name: Build and Release

on:
  workflow_dispatch:
    inputs:
      force_bump:
        description: 'Force bump type (auto-detect if not set)'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: 'auto'

env:
  GO_VERSION: '1.21'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Determine version bump
        id: bump
        run: |
          # Get latest tag (or start from v0.0.0 if none)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Strip 'v' prefix
          CURRENT_VERSION=${LATEST_TAG#v}
          echo "Current version: $CURRENT_VERSION"

          # Parse version
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          FORCE_BUMP="${{ github.event.inputs.force_bump }}"

          if [ "$FORCE_BUMP" = "auto" ] || [ -z "$FORCE_BUMP" ]; then
            # Auto-detect from commits since last tag
            if [ "$LATEST_TAG" = "v0.0.0" ]; then
              # First release - check all commits
              COMMITS=$(git log --pretty=format:"%s" 2>/dev/null || echo "")
            else
              COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" --no-merges 2>/dev/null || echo "")
            fi

            echo "Analyzing commits..."
            echo "$COMMITS"

            BUMP_TYPE="patch"  # default

            # Check for breaking changes first (highest priority)
            if echo "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:"; then
              BUMP_TYPE="major"
            # Then check for features
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP_TYPE="minor"
            # Default is patch for fix:, chore:, docs:, etc.
            fi

            echo "Auto-detected bump type: $BUMP_TYPE"
          else
            BUMP_TYPE="$FORCE_BUMP"
            echo "Forced bump type: $BUMP_TYPE"
          fi

          # Apply bump
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "prev_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "bump_type=${BUMP_TYPE}" >> $GITHUB_OUTPUT

      - name: Build binary
        working-directory: xkeen-go
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)

          go build -ldflags "-s -w \
            -X main.appVersion=${{ steps.bump.outputs.version }} \
            -X main.buildDate=${BUILD_DATE} \
            -X main.gitCommit=${GIT_COMMIT}" \
            -o xkeen-go-keenetic-arm64

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG="${{ steps.bump.outputs.prev_tag }}"
          CURRENT_TAG="${{ steps.bump.outputs.tag }}"
          VERSION="${{ steps.bump.outputs.version }}"
          BUMP_TYPE="${{ steps.bump.outputs.bump_type }}"

          # Generate changelog section
          if [ "$PREV_TAG" = "v0.0.0" ]; then
            CHANGES="## Initial Release\n"
            CHANGES+="\n"
            CHANGES+=$(git log --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "")
          else
            CHANGES="## Changes since ${PREV_TAG}\n"
            CHANGES+="\n"
            CHANGES+=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- No changes")
          fi

          # Create full release notes
          cat > /tmp/release-notes.md << ENDNOTES
          ## XKEEN-GO ${VERSION}

          **Bump type:** ${BUMP_TYPE} (${PREV_TAG} → ${CURRENT_TAG})

          ${CHANGES}

          ---

          ### Supported Devices
          - KN-1010, KN-1011
          - KN-1810, KN-1910
          - Other Keenetic routers with ARM64 processor and Entware

          ### Installation
          \`\`\`sh
          # Download and make executable
          chmod +x xkeen-go-keenetic-arm64

          # Install (run as root)
          ./xkeen-go-keenetic-arm64 install

          # Start service
          /opt/etc/init.d/xkeen-go start
          \`\`\`

          ### Default Credentials
          - Username: \`admin\`
          - Password: \`admin\`
          - **Change password immediately after first login!**
          ENDNOTES

          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: XKEEN-GO ${{ steps.bump.outputs.version }}
          body_path: /tmp/release-notes.md
          files: |
            xkeen-go/xkeen-go-keenetic-arm64
          draft: false
