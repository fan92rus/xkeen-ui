name: Build and Release

on:
  workflow_dispatch:
    inputs:
      force_bump:
        description: 'Force bump type (auto-detect if not set)'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: 'auto'

env:
  GO_VERSION: '1.26'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Build frontend
        working-directory: xkeen-go
        run: make build-frontend

      - name: Clean frontend artifacts
        working-directory: xkeen-go
        run: rm -rf web/node_modules web/package-lock.json web/build.js web/static/vendor

      - name: Determine version bump
        id: bump
        run: |
          # Get latest stable tag (exclude dev tags)
          LATEST_STABLE_TAG=$(git tag -l 'v[0-9]*' | grep -v -- '-dev' | sort -V | tail -1 2>/dev/null || echo "v0.0.0")
          echo "Latest stable tag: $LATEST_STABLE_TAG"

          # Get latest dev tag if exists
          LATEST_DEV_TAG=$(git tag -l 'v*-dev.*' | sort -V | tail -1 2>/dev/null || echo "")
          echo "Latest dev tag: $LATEST_DEV_TAG"

          FORCE_BUMP="${{ github.event.inputs.force_bump }}"

          if [ "$FORCE_BUMP" = "auto" ] || [ -z "$FORCE_BUMP" ]; then
            # Auto mode: use dev version if exists, otherwise bump from stable
            if [ -n "$LATEST_DEV_TAG" ]; then
              # Extract base version from dev tag (e.g., v1.13.2-dev.123 -> 1.13.2)
              DEV_VERSION=${LATEST_DEV_TAG#v}
              BASE_VERSION=$(echo "$DEV_VERSION" | sed 's/-dev\..*//')
              NEW_VERSION="$BASE_VERSION"
              BUMP_TYPE="none (from dev)"
              echo "Using version from dev tag: $NEW_VERSION"
            else
              # No dev tag - bump from stable
              CURRENT_VERSION=${LATEST_STABLE_TAG#v}
              MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
              MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
              PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

              # Default bump
              PATCH=$((PATCH + 1))
              BUMP_TYPE="patch (auto)"

              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
              echo "Bumping from stable: $NEW_VERSION"
            fi
          else
            # Force bump - always bump from stable tag
            CURRENT_VERSION=${LATEST_STABLE_TAG#v}
            MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
            MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
            PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

            case "$FORCE_BUMP" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            BUMP_TYPE="$FORCE_BUMP (forced)"
            echo "Forced bump from stable: $NEW_VERSION"
          fi

          NEW_TAG="v${NEW_VERSION}"

          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "prev_tag=${LATEST_STABLE_TAG}" >> $GITHUB_OUTPUT
          echo "bump_type=${BUMP_TYPE}" >> $GITHUB_OUTPUT

      - name: Finalize changelog
        working-directory: xkeen-go
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          echo "Finalizing changelog for version $VERSION"
          # Move unreleased entries to a versioned release entry
          sh scripts/finalize-changelog.sh "$VERSION" internal/version/changelog.json
          # Show result
          echo "=== Finalized changelog.json ==="
          cat internal/version/changelog.json

      - name: Build binaries
        working-directory: xkeen-go
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)

          # Build ARM64
          echo "Building ARM64..."
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w \
            -X main.appVersion=${{ steps.bump.outputs.version }} \
            -X main.buildDate=${BUILD_DATE} \
            -X main.gitCommit=${GIT_COMMIT}" \
            -o xkeen-ui-keenetic-arm64

          # Build MIPSLE (for KN-1010 and similar)
          echo "Building MIPSLE..."
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -ldflags "-s -w \
            -X main.appVersion=${{ steps.bump.outputs.version }} \
            -X main.buildDate=${BUILD_DATE} \
            -X main.gitCommit=${GIT_COMMIT}" \
            -o xkeen-ui-keenetic-mipsle

      - name: Generate SHA256 checksums
        working-directory: xkeen-go
        run: |
          # Generate checksums for both binaries
          sha256sum xkeen-ui-keenetic-arm64 > xkeen-ui-keenetic-arm64.sha256
          sha256sum xkeen-ui-keenetic-mipsle > xkeen-ui-keenetic-mipsle.sha256

          echo "Checksums generated:"
          cat xkeen-ui-keenetic-arm64.sha256
          cat xkeen-ui-keenetic-mipsle.sha256

          # Verify checksum format (should be: "hash  filename")
          for file in xkeen-ui-keenetic-arm64.sha256 xkeen-ui-keenetic-mipsle.sha256; do
            if [ $(wc -w < "$file") -ne 2 ]; then
              echo "ERROR: Invalid checksum format in $file"
              exit 1
            fi
          done

      - name: Generate release notes
        id: notes
        working-directory: xkeen-go
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          PREV_TAG="${{ steps.bump.outputs.prev_tag }}"
          CURRENT_TAG="${{ steps.bump.outputs.tag }}"
          BUMP_TYPE="${{ steps.bump.outputs.bump_type }}"

          # Generate human-readable release notes from curated changelog
          CHANGELOG_NOTES=$(GENERATE_NOTES=1 sh scripts/finalize-changelog.sh "$VERSION" internal/version/changelog.json 2>/dev/null || echo "")

          cat > /tmp/release-notes.md << ENDNOTES
          ## XKEEN-GO ${VERSION}

          **Bump type:** ${BUMP_TYPE} (${PREV_TAG} → ${CURRENT_TAG})

          ${CHANGELOG_NOTES}

          ---

          ### Supported Devices

          **ARM64** (xkeen-ui-keenetic-arm64):
          - KN-1810, KN-1910
          - Other Keenetic routers with ARM64 processor and Entware

          **MIPS** (xkeen-ui-keenetic-mipsle):
          - KN-1010, KN-1011
          - Other Keenetic routers with MIPS processor and Entware

          ### Installation
          \`\`\`sh
          # Download and make executable (choose your architecture)
          chmod +x xkeen-ui-keenetic-arm64  # for ARM64
          # or
          chmod +x xkeen-ui-keenetic-mipsle    # for MIPS

          # Install (run as root)
          ./xkeen-ui-keenetic-arm64 install  # or xkeen-ui-keenetic-mipsle

          # Start service
          /opt/etc/init.d/xkeen-ui start
          \`\`\`

          ### Verify Download (Optional)
          \`\`\`sh
          # Download checksum file for your architecture
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.tag }}/xkeen-ui-keenetic-arm64.sha256
          # or
          wget https://github.com/${{ github.repository }}/releases/download/${{ steps.bump.outputs.tag }}/xkeen-ui-keenetic-mipsle.sha256

          # Verify integrity
          sha256sum -c xkeen-ui-keenetic-arm64.sha256
          # Should output: xkeen-ui-keenetic-arm64: OK
          \`\`\`

          ### Default Credentials
          - Username: \`admin\`
          - Password: \`admin\`
          - **Change password immediately after first login!**
          ENDNOTES

          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Delete all pre-releases and dev tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Deleting all pre-releases..."
          gh release list --limit 100 --json tagName,isPrerelease | \
            jq -r '.[] | select(.isPrerelease == true) | .tagName' | \
            while read tag; do
              echo "Deleting pre-release: $tag"
              gh release delete "$tag" --yes 2>/dev/null || true
            done

          echo "Deleting all dev tags..."
          git tag -l 'v*-dev.*' | \
            while read tag; do
              echo "Deleting dev tag: $tag"
              git push --delete origin "$tag" 2>/dev/null || true
              git tag -d "$tag" 2>/dev/null || true
            done

      - name: Commit finalized changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xkeen-go/internal/version/changelog.json
          git commit -m "chore: finalize changelog for ${{ steps.bump.outputs.version }}" || true
          git push origin HEAD:master

      - name: Create tag
        run: |
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: XKEEN-GO ${{ steps.bump.outputs.version }}
          body_path: /tmp/release-notes.md
          files: |
            xkeen-go/xkeen-ui-keenetic-arm64
            xkeen-go/xkeen-ui-keenetic-arm64.sha256
            xkeen-go/xkeen-ui-keenetic-mipsle
            xkeen-go/xkeen-ui-keenetic-mipsle.sha256
          draft: false
