name: Build and Release

on:
  workflow_dispatch:
    inputs:
      force_bump:
        description: 'Force bump type (auto-detect if not set)'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: 'auto'

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '24'

jobs:
  # ─── Quality Gate — all checks run in parallel ───
  go-checks:
    name: Go (vet, test -race, govulncheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest && $(go env GOPATH)/bin/govulncheck ./...

  frontend-checks:
    name: Frontend (build, test, lint, audit, e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go/web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: xkeen-go/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - run: npm audit --omit=dev --audit-level=high

      # Install Chrome (download) as non-root, then install system deps as root
      - name: Install Chromium + system deps
        run: |
          npx puppeteer browsers install chrome
          sudo -E npx puppeteer browsers install chrome --install-deps

      - name: Setup Go (for e2e server binary)
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: 'true'

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xkeen-go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod
      - run: go mod download
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
          working-directory: xkeen-go
          install-mode: goinstall

  security:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/auto
            .semgrep.yml

  # ─── Build & Release (only when all checks pass) ───
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: [go-checks, frontend-checks, lint, security]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: xkeen-go/go.mod

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: xkeen-go
        run: make build-frontend

      - name: Clean frontend artifacts
        working-directory: xkeen-go
        run: rm -rf web/node_modules web/package-lock.json web/build.js web/static/vendor

      - name: Determine version bump
        id: bump
        run: |
          LATEST_STABLE_TAG=$(git tag -l 'v[0-9]*' | grep -v -- '-dev' | sort -V | tail -1 2>/dev/null || echo "v0.0.0")
          echo "Latest stable tag: $LATEST_STABLE_TAG"
          LATEST_DEV_TAG=$(git tag -l 'v*-dev.*' | sort -V | tail -1 2>/dev/null || echo "")
          FORCE_BUMP="${{ github.event.inputs.force_bump }}"
          if [ "$FORCE_BUMP" = "auto" ] || [ -z "$FORCE_BUMP" ]; then
            if [ -n "$LATEST_DEV_TAG" ]; then
              DEV_VERSION=${LATEST_DEV_TAG#v}
              BASE_VERSION=$(echo "$DEV_VERSION" | sed 's/-dev\..*//')
              NEW_VERSION="$BASE_VERSION"
              echo "Using version from dev tag: $NEW_VERSION"
            else
              CURRENT_VERSION=${LATEST_STABLE_TAG#v}
              MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
              MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
              PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
              PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          else
            CURRENT_VERSION=${LATEST_STABLE_TAG#v}
            MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
            MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
            PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
            case "$FORCE_BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          NEW_TAG="v${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "prev_tag=${LATEST_STABLE_TAG}" >> $GITHUB_OUTPUT

      - name: Finalize changelog
        working-directory: xkeen-go
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          sh scripts/finalize-changelog.sh "$VERSION" internal/version/changelog.json
          echo "=== Finalized changelog.json ==="
          cat internal/version/changelog.json

      - name: Build binaries
        working-directory: xkeen-go
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w \
            -X main.appVersion=${{ steps.bump.outputs.version }} \
            -X main.buildDate=${BUILD_DATE} \
            -X main.gitCommit=${GIT_COMMIT}" \
            -o xkeen-ui-keenetic-arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -ldflags "-s -w \
            -X main.appVersion=${{ steps.bump.outputs.version }} \
            -X main.buildDate=${BUILD_DATE} \
            -X main.gitCommit=${GIT_COMMIT}" \
            -o xkeen-ui-keenetic-mipsle

      - name: Generate SHA256 checksums
        working-directory: xkeen-go
        run: |
          sha256sum xkeen-ui-keenetic-arm64 > xkeen-ui-keenetic-arm64.sha256
          sha256sum xkeen-ui-keenetic-mipsle > xkeen-ui-keenetic-mipsle.sha256
          for file in xkeen-ui-keenetic-arm64.sha256 xkeen-ui-keenetic-mipsle.sha256; do
            if [ $(wc -w < "$file") -ne 2 ]; then echo "ERROR: Invalid checksum format in $file"; exit 1; fi
          done

      - name: Generate release notes
        id: notes
        working-directory: xkeen-go
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          CHANGELOG_NOTES=$(GENERATE_NOTES=1 sh scripts/finalize-changelog.sh "$VERSION" internal/version/changelog.json 2>/dev/null || echo "")
          cat > /tmp/release-notes.md << ENDNOTES
          ## XKEEN-GO ${VERSION}

          **${LATEST_STABLE_TAG} → ${{ steps.bump.outputs.tag }}**

          ${CHANGELOG_NOTES}

          ---

          ### Supported Devices
          **ARM64** (xkeen-ui-keenetic-arm64): KN-1810, KN-1910, Other Keenetic routers with ARM64
          **MIPS** (xkeen-ui-keenetic-mipsle): KN-1010, KN-1011, Other Keenetic routers with MIPS

          ### Installation
          \`\`\`sh
          chmod +x xkeen-ui-keenetic-arm64  # or xkeen-ui-keenetic-mipsle
          ./xkeen-ui-keenetic-arm64 install
          /opt/etc/init.d/xkeen-ui start
          \`\`\`

          ### Default Credentials
          - Username: \`admin\`
          - Password: \`admin\`
          - **Change password immediately after first login!**
          ENDNOTES
          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Delete all pre-releases and dev tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Deleting all pre-releases..."
          gh release list --limit 100 --json tagName,isPrerelease | \
            jq -r '.[] | select(.isPrerelease == true) | .tagName' | \
            while read tag; do
              echo "Deleting pre-release: $tag"
              gh release delete "$tag" --yes 2>/dev/null || true
            done
          echo "Deleting all dev tags..."
          git tag -l 'v*-dev.*' | \
            while read tag; do
              echo "Deleting dev tag: $tag"
              git push --delete origin "$tag" 2>/dev/null || true
              git tag -d "$tag" 2>/dev/null || true
            done

      - name: Commit finalized changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xkeen-go/internal/version/changelog.json
          git commit -m "chore: finalize changelog for ${{ steps.bump.outputs.version }}" || true
          git push origin HEAD:master

      - name: Create tag
        run: |
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: XKEEN-GO ${{ steps.bump.outputs.version }}
          body_path: /tmp/release-notes.md
          files: |
            xkeen-go/xkeen-ui-keenetic-arm64
            xkeen-go/xkeen-ui-keenetic-arm64.sha256
            xkeen-go/xkeen-ui-keenetic-mipsle
            xkeen-go/xkeen-ui-keenetic-mipsle.sha256
          draft: false
