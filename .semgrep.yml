# Semgrep custom rules for xkeen-go
# The auto ruleset (p/auto) is passed via CI config and covers OWASP Top 10.
# This file contains ONLY custom project-specific rules.
# Rules here must be precise (no broad patterns that cause false positives).

rules: []
  # Custom rules are disabled for now — the p/auto ruleset covers the main
  # security patterns (path traversal, XSS, hardcoded secrets).
  #
  # To add a custom rule, follow this template:
  #
  # - id: xkeen-<unique-name>
  #   languages: [go]
  #   message: "Description of the issue"
  #   severity: ERROR
  #   patterns:
  #     - pattern: |
  #         $BAD_FUNCTION($USER_INPUT)
  #     - pattern-not: |
  #         $BAD_FUNCTION($VALIDATED)
