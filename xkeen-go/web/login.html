<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230097dc'/><path d='M16 4L4 10.5l12 6.5 12-6.5L16 4z' fill='white' opacity='.9'/><path d='M4 16l12 6.5L28 16' fill='none' stroke='white' stroke-width='1.8' stroke-linejoin='round' opacity='.6'/><path d='M4 21.5l12 6.5 12-6.5' fill='none' stroke='white' stroke-width='1.8' stroke-linejoin='round' opacity='.35'/></svg>">
    <title>XKEEN-UI</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .change-password-form { display: none; }
        .change-password-form.active { display: block; }
        .login-form.hidden { display: none; }
        .warning-box {
            background: var(--status-caution-background); border: 1px solid var(--status-caution-border);
            color: var(--status-caution-text); padding: 10px 14px; border-radius: var(--radius); margin-bottom: 16px; font-size: var(--text-body); line-height: var(--lh-body);
        }
        .password-requirements { font-size: var(--text-small); color: var(--text-gray); margin-top: 6px; line-height: var(--lh-small); }
        .password-strength { height: 3px; margin-top: 8px; border-radius: 2px; transition: all 0.3s; }
        .strength-weak { background: var(--error); }
        .strength-medium { background: var(--status-caution-text); }
        .strength-strong { background: var(--status-success-text); }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">⚙</div>
            <form class="login-form" id="loginForm">
                <input type="password" name="password" placeholder="Пароль" required autofocus>
                <button type="submit">Войти</button>
            </form>

            <form class="login-form change-password-form" id="changePasswordForm">
                <div class="login-title">Смена пароля</div>
                <div class="warning-box" id="securityWarning">
                    Обнаружены стандартные учётные данные. Смените пароль.
                </div>
                <input type="password" name="current_password" placeholder="Текущий пароль" required>
                <input type="password" name="new_password" placeholder="Новый пароль" required id="newPassword">
                <div class="password-strength" id="passwordStrength"></div>
                <div class="password-requirements" id="passwordRequirements">Минимум 8 символов</div>
                <input type="password" name="confirm_password" placeholder="Подтверждение" required>
                <button type="submit" id="changePasswordBtn">Изменить пароль</button>
            </form>
        </div>
    </div>
    <div id="toast" class="toast hidden"></div>

    <script src="/static/js/login.js"></script>
</body>
</html>
