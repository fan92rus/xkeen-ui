# golangci-lint v2 configuration for xkeen-go
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - revive
    - misspell
    - unconvert
    - prealloc
    - nolintlint

  settings:
    errcheck:
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf

    gosec:
      excludes:
        - G104
        - G304
      severity: medium
      confidence: medium

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeValCopy

    staticcheck:
      checks: ["all"]

    misspell:
      locale: US

  exclusions:
    presets:
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - prealloc
      - path: internal/testutil/
        linters:
          - errcheck
          - gosec
      - path: main\.go
        linters:
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
